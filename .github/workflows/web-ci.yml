name: web-ci

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/types/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "turbo.json"
      - ".github/workflows/web-ci.yml"

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui:
    name: "@takeaseat/ui"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npm run build --workspace=@takeaseat/ui
      - name: Test with coverage
        run: npm run test:coverage --workspace=@takeaseat/ui
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: packages/ui/coverage/lcov.info
          flags: ui
          name: ui-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-coverage
          path: packages/ui/coverage
          retention-days: 14

  web:
    name: "@takeaseat/web"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - name: Type-check
        run: npm run typecheck --workspace=@takeaseat/web
      - name: Test with coverage
        run: npm run test:coverage --workspace=@takeaseat/web
      - name: Build
        run: npm run build --workspace=@takeaseat/web
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: apps/web/coverage/lcov.info
          flags: web
          name: web-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: apps/web/coverage
          retention-days: 14
