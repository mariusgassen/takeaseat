coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
      ui:
        target: 80%
        flags: [ui]
      web:
        target: 70%
        flags: [web]
    patch:
      default:
        target: 70%
        threshold: 5%

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: ui
      paths: [packages/ui/]
    - name: web
      paths: [apps/web/]

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

ignore:
  - "**/*.test.{ts,tsx}"
  - "**/*.d.ts"
  - "**/mocks/**"
  - "**/generated/**"
  - "apps/api/**"
