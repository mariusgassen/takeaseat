version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/queries.sql"
    schema: "../../infra/postgres/03-schema.sql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
        emit_prepared_functions: true
        emit_methods_with_db_argument: false